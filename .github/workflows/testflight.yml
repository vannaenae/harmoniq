# Builds the iOS app with Capacitor and uploads it to TestFlight.
# Trigger manually: GitHub → Actions → "TestFlight" → Run workflow.
#
# One-time setup — repository secrets (Settings → Secrets and variables → Actions):
#
#   Apple (App Store Connect → Users and Access → Integrations → App Store Connect API,
#   create a key with App Manager role):
#     ASC_API_KEY_ID      Key ID, e.g. 2X9R4HXF34
#     ASC_API_ISSUER_ID   Issuer ID (UUID shown above the key list)
#     ASC_API_KEY_P8      Full contents of the downloaded AuthKey_XXXX.p8 file
#     APPLE_TEAM_ID       10-char Team ID (developer.apple.com → Membership)
#
#   Firebase web config (same values as the Vercel env / local .env — these are
#   browser-visible by design, but secrets keep them out of the workflow file):
#     VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN, VITE_FIREBASE_PROJECT_ID,
#     VITE_FIREBASE_STORAGE_BUCKET, VITE_FIREBASE_MESSAGING_SENDER_ID,
#     VITE_FIREBASE_APP_ID, VITE_FIREBASE_MEASUREMENT_ID
#
# Also required (one time, in the Apple ecosystem):
#   • An Apple Developer Program membership.
#   • An app record in App Store Connect with bundle ID com.soulspce.harmoniqapp.
#   Signing is cloud-managed (Xcode automatic signing + the API key) — no
#   certificates or provisioning profiles need to be uploaded to GitHub.

name: TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.testflight-version']

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (Apple requires the iOS 26 SDK for App Store uploads)
        run: |
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            echo "::error::No Xcode 26.x found on this runner. Available:"
            ls /Applications | grep -i xcode
            exit 1
          fi
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Check required secrets
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: |
          missing=""
          for v in ASC_API_KEY_ID ASC_API_ISSUER_ID ASC_API_KEY_P8 APPLE_TEAM_ID VITE_FIREBASE_API_KEY; do
            [ -z "${!v}" ] && missing="$missing $v"
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing repository secrets:$missing — see the comment at the top of .github/workflows/testflight.yml"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web app
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: npm run build --workspace @harmoniq/web

      - name: Generate iOS project
        run: npx cap add ios

      - name: Generate app icons and splash screens
        run: npx @capacitor/assets generate --ios

      - name: Sync web assets into iOS project
        run: npx cap sync ios

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: printf '%s' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: >
          xcodebuild archive
          -project ios/App/App.xcodeproj
          -scheme App
          -configuration Release
          -destination 'generic/platform=iOS'
          -archivePath "$RUNNER_TEMP/App.xcarchive"
          CODE_SIGN_STYLE=Automatic
          DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
          MARKETING_VERSION=0.1.0
          CURRENT_PROJECT_VERSION=${{ github.run_number }}
          -allowProvisioningUpdates
          -allowProvisioningDeviceRegistration
          -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8"
          -authenticationKeyID "$ASC_API_KEY_ID"
          -authenticationKeyIssuerID "$ASC_API_ISSUER_ID"

      - name: Write export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>upload</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>manageAppVersionAndBuildNumber</key><true/>
          </dict>
          </plist>
          PLIST

      - name: Export and upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: >
          xcodebuild -exportArchive
          -archivePath "$RUNNER_TEMP/App.xcarchive"
          -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
          -exportPath "$RUNNER_TEMP/export"
          -allowProvisioningUpdates
          -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8"
          -authenticationKeyID "$ASC_API_KEY_ID"
          -authenticationKeyIssuerID "$ASC_API_ISSUER_ID"

      - name: Add build to internal testing group
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          node - <<'NODEJS'
          const crypto = require('crypto');
          const https = require('https');

          const keyId    = process.env.ASC_API_KEY_ID;
          const issuerId = process.env.ASC_API_ISSUER_ID;
          const keyP8    = process.env.ASC_API_KEY_P8;
          const bundleId = 'com.soulspce.harmoniqapp';
          const runNum   = process.env.BUILD_NUMBER;

          function jwt() {
            const hdr = Buffer.from(JSON.stringify({ alg: 'ES256', kid: keyId, typ: 'JWT' })).toString('base64url');
            const now = Math.floor(Date.now() / 1000);
            const pay = Buffer.from(JSON.stringify({ iss: issuerId, iat: now, exp: now + 1200, aud: 'appstoreconnect-v1' })).toString('base64url');
            const sig = crypto.createSign('SHA256').update(`${hdr}.${pay}`);
            return `${hdr}.${pay}.${sig.sign(keyP8, 'base64url')}`;
          }

          function api(method, path, body) {
            return new Promise((resolve, reject) => {
              const payload = body ? JSON.stringify(body) : null;
              const opts = {
                hostname: 'api.appstoreconnect.apple.com', path, method,
                headers: { Authorization: `Bearer ${jwt()}`, ...(payload ? { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) } : {}) }
              };
              const req = https.request(opts, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({ status: res.statusCode, body: d ? JSON.parse(d) : {} }));
              });
              req.on('error', reject);
              if (payload) req.write(payload);
              req.end();
            });
          }

          async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          async function main() {
            const apps = await api('GET', `/v1/apps?filter[bundleId]=${bundleId}`);
            const appId = apps.body.data[0].id;
            console.log('App ID:', appId);

            const groups = await api('GET', `/v1/betaGroups?filter[app]=${appId}&filter[isInternalGroup]=true`);
            const groupId = groups.body.data[0].id;
            const groupName = groups.body.data[0].attributes.name;
            console.log(`Internal group: ${groupName} (${groupId})`);

            // Poll up to 20 min for the build to finish processing.
            let buildId;
            for (let i = 0; i < 40; i++) {
              const builds = await api('GET', `/v1/builds?filter[app]=${appId}&filter[processingState]=VALID&sort=-uploadedDate&limit=5`);
              const match = builds.body.data.find(b => b.attributes.version === runNum);
              if (match) { buildId = match.id; break; }
              console.log(`Waiting for build ${runNum} to process... (${i + 1}/40)`);
              await sleep(30000);
            }

            if (!buildId) { console.error('Build not found after 20 min'); process.exit(1); }
            console.log('Build ID:', buildId);

            const result = await api('POST', `/v1/betaGroups/${groupId}/relationships/builds`, {
              data: [{ type: 'builds', id: buildId }]
            });

            if (result.status === 204 || result.status === 200) {
              console.log(`Build added to "${groupName}" — testers will be notified automatically.`);
            } else {
              console.error('Unexpected response:', result.status, JSON.stringify(result.body));
              process.exit(1);
            }
          }

          main().catch(err => { console.error(err); process.exit(1); });
          NODEJS

      - name: Summary
        run: |
          echo "## TestFlight upload complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Build **0.1.0 (${{ github.run_number }})** uploaded and added to the internal testing group." >> "$GITHUB_STEP_SUMMARY"
