# Deploys the Firebase backend (Cloud Functions + Firestore/Storage rules)
# whenever backend files change on main, or manually via "Run workflow".
#
# One-time setup: add a repository secret named FIREBASE_SERVICE_ACCOUNT
# containing a service-account JSON key for the choir-flow-26 project
# (Firebase console → Project settings → Service accounts → Generate new
# private key). GitHub repo → Settings → Secrets and variables → Actions.

name: Deploy Firebase backend

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firebase.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: npm ci --prefix functions

      - name: Write service-account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set — see the comment at the top of this workflow file."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"

      - name: Deploy functions and rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: >
          npx firebase-tools@15 deploy
          --only functions,firestore:rules,storage
          --project choir-flow-26
          --non-interactive --force
